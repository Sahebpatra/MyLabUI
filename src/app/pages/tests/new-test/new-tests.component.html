<div>
  @if (config$ | async; as config) {
    <app-dynamic-form
      [config]="config"
      [initialData]="testData"
      [isEditMode]="isEditMode"
      (onSave)="onTestSubmit($event)"
      (onBack)="onBack()"
    >
      <app-parameters
        [paramsList]="parameterList"
        (paramsListChanged)="onParamsListUpdate($event)"
      ></app-parameters>
    </app-dynamic-form>
  }
</div>
