<div class="login-container d-flex align-items-center justify-content-center bg-gray-app">
  <div class="card login-card shadow border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="fas fa-microscope fa-3x text-primary mb-3"></i>
        <h4 class="fw-bold">Welcome Back</h4>
      </div>

      <!-- Tab Navigation -->
      <ul class="nav nav-pills nav-justified mb-4" id="loginTabs" role="tablist">
        <li class="nav-item">
          <button class="nav-link active" id="otp-tab" data-bs-toggle="pill" data-bs-target="#otp-pane" type="button">
            <i class="fas fa-mobile-alt me-2"></i>Mobile OTP
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" id="user-tab" data-bs-toggle="pill" data-bs-target="#user-pane" type="button">
            <i class="fas fa-user-lock me-2"></i>User Login
          </button>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content" id="loginTabsContent">
        
        <!-- Mobile OTP Option -->
        <div class="tab-pane fade show active" id="otp-pane" role="tabpanel">
          <form (submit)="onOtpLogin(); $event.preventDefault()">
            <div class="mb-3">
              <label class="form-label text-secondary small fw-bold">Mobile Number</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-phone text-muted"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" placeholder="Enter your mobile number">
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mt-2 shadow-sm">Send OTP</button>
          </form>
        </div>

        <!-- Username/Password Option -->
        <div class="tab-pane fade" id="user-pane" role="tabpanel">
          <form (submit)="onUserLogin(); $event.preventDefault()" >
            <div class="mb-3">
              <label class="form-label text-secondary small fw-bold">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" class="form-control border-start-0 ps-0" placeholder="Username">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label text-secondary small fw-bold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0 ps-0" placeholder="••••••••">
              </div>
            </div>
            <div class="d-flex justify-content-between mb-3 small">
              <div class="form-check">
                <input class="form-check-box me-1" type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-decoration-none">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Login</button>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>
